<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="LidStay는 Mac을 필요한 시간 동안 조용히 켜두는 macOS 메뉴바 앱입니다.">
  <title>LidStay - Mac을 필요한 시간만 켜두기</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f6f3;
      --fg: #202124;
      --muted: #64676b;
      --line: rgba(32, 33, 36, 0.13);
      --panel: rgba(255, 255, 255, 0.78);
      --accent: #28c76f;
      --accent-text: #0b6b3e;
      --shadow: 0 20px 54px rgba(19, 24, 29, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #171817;
        --fg: #f4f4f0;
        --muted: #a6a7a1;
        --line: rgba(255, 255, 255, 0.14);
        --panel: rgba(35, 36, 34, 0.78);
        --accent-text: #55d891;
        --shadow: 0 20px 54px rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(880px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 34px 0 42px;
    }

    nav,
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand,
    .links {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand {
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }

    .brand img {
      width: 30px;
      height: 30px;
      border-radius: 7px;
    }

    .links {
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .links a {
      text-decoration: none;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 236px;
      gap: 46px;
      align-items: center;
      min-height: calc(100vh - 150px);
      padding: 70px 0;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 15px;
      color: var(--accent-text);
      font-size: 14px;
      font-weight: 700;
    }

    .label::before {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      content: "";
    }

    h1 {
      max-width: 640px;
      margin: 0;
      font-size: clamp(44px, 7vw, 74px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .lead {
      max-width: 560px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 19px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 11px 17px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: transparent;
      color: var(--fg);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
    }

    .button.primary {
      border-color: transparent;
      background: var(--accent);
      color: #07140c;
      box-shadow: 0 12px 30px rgba(40, 199, 111, 0.24);
    }

    .notes {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin: 24px 0 0;
      padding: 0;
      color: var(--muted);
      font-size: 13px;
      list-style: none;
    }

    .notes li {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .notes li::before {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      content: "";
    }

    .preview {
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .blink {
      position: relative;
      width: 128px;
      height: 128px;
      margin: 0 auto 20px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
    }

    .blink img {
      display: block;
      width: 128px;
      height: 128px;
      border-radius: 28px;
    }

    .blink::after {
      position: absolute;
      inset: 0;
      background: #050806;
      transform: translateY(-101%);
      animation: blink 5.8s ease-in-out infinite;
      content: "";
    }

    @keyframes blink {
      0%,
      86%,
      100% {
        transform: translateY(-101%);
      }

      90%,
      92% {
        transform: translateY(0);
      }

      95% {
        transform: translateY(-101%);
      }
    }

    .meta {
      display: grid;
      gap: 10px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .meta div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .meta div:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .meta strong {
      color: var(--fg);
      font-weight: 700;
    }

    footer {
      color: var(--muted);
      font-size: 13px;
    }

    footer a {
      font-weight: 700;
      text-decoration: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .blink::after {
        animation: none;
      }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100vw - 28px, 560px);
      }

      main {
        grid-template-columns: 1fr;
        min-height: auto;
        padding: 54px 0 44px;
      }

      .preview {
        order: -1;
      }
    }

    @media (max-width: 480px) {
      nav,
      footer {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        font-size: 42px;
      }

      .lead {
        font-size: 17px;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav aria-label="주요 메뉴">
      <a class="brand" href="#">
        <img src="assets/lidstay-icon.png" alt="" width="30" height="30">
        <span>LidStay</span>
      </a>
      <div class="links">
        <a href="https://github.com/ghkdqhrbals/LidStay/releases/latest">Release</a>
        <a href="https://github.com/ghkdqhrbals/LidStay">GitHub</a>
      </div>
    </nav>

    <main>
      <section aria-labelledby="title">
        <p class="label">macOS menu bar app</p>
        <h1 id="title">Mac을 필요한 시간만 켜두세요.</h1>
        <p class="lead">LidStay는 화면 절전은 그대로 두고, 작업이 끝날 때까지 Mac의 시스템 잠자기만 조용히 늦춥니다.</p>
        <div class="actions">
          <a class="button primary" href="https://github.com/ghkdqhrbals/LidStay/releases/latest/download/LidStay.pkg">LidStay.pkg 다운로드</a>
          <a class="button" href="https://github.com/ghkdqhrbals/LidStay/releases/latest">릴리스 확인</a>
        </div>
        <ul class="notes" aria-label="배포 정보">
          <li>Apple 공증</li>
          <li>Developer ID 서명</li>
          <li>macOS 13+</li>
          <li>오픈소스</li>
        </ul>
      </section>

      <aside class="preview" aria-label="LidStay 앱 미리보기">
        <div class="blink">
          <img src="assets/lidstay-icon.png" alt="LidStay 앱 아이콘" width="128" height="128">
        </div>
        <div class="meta">
          <div><strong>설치</strong><span>pkg 하나로 완료</span></div>
          <div><strong>위치</strong><span>메뉴바</span></div>
          <div><strong>화면</strong><span>절전 허용</span></div>
        </div>
      </aside>
    </main>

    <footer>
      <span>Made for macOS 13+</span>
      <span><a href="https://github.com/ghkdqhrbals/LidStay">GitHub</a> · <a href="https://github.com/ghkdqhrbals/LidStay/releases/latest">Latest Release</a></span>
    </footer>
  </div>
</body>
</html>
