name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build, notarize, and publish
    runs-on: macos-latest
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      DEVELOPER_ID_APPLICATION: "Developer ID Application: gyumin hwangbo (4CL25TC734)"
      DEVELOPER_ID_INSTALLER: "Developer ID Installer: gyumin hwangbo (4CL25TC734)"
      NOTARYTOOL_PROFILE: "lidstay-notary"
      SPARKLE_FEED_URL: "https://github.com/ghkdqhrbals/LidStay/releases/latest/download/appcast.xml"
      SPARKLE_PUBLIC_ED_KEY: "SFBDrWBr+kRxZOiUM1xHY+XgbC8vqAZ9fcLadJ9Trmw="

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for name in \
            APP_STORE_CONNECT_API_KEY_BASE64 \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 \
            DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD \
            SPARKLE_PRIVATE_ED_KEY
          do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing GitHub secret: $name" >&2
              missing=1
            fi
          done
          exit "$missing"
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}

      - name: Import Developer ID certificates
        env:
          APP_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          APP_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          INSTALLER_CERT_BASE64: ${{ secrets.DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64 }}
          INSTALLER_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD="$(uuidgen)-$(uuidgen)"
          KEYCHAIN_PATH="$RUNNER_TEMP/lidstay-signing.keychain-db"
          APP_CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/developer-id-installer.p12"

          printf '%s' "$APP_CERT_BASE64" > "$RUNNER_TEMP/developer-id-application.p12.b64"
          /usr/bin/base64 -D -i "$RUNNER_TEMP/developer-id-application.p12.b64" -o "$APP_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          security import "$APP_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APP_CERT_PASSWORD" -T /usr/bin/codesign
          if [[ -n "$INSTALLER_CERT_BASE64" && -n "$INSTALLER_CERT_PASSWORD" ]]; then
            printf '%s' "$INSTALLER_CERT_BASE64" > "$RUNNER_TEMP/developer-id-installer.p12.b64"
            /usr/bin/base64 -D -i "$RUNNER_TEMP/developer-id-installer.p12.b64" -o "$INSTALLER_CERT_PATH"
            security import "$INSTALLER_CERT_PATH" -k "$KEYCHAIN_PATH" -P "$INSTALLER_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/pkgbuild -T /usr/bin/productbuild
            echo "BUILD_PKG=true" >> "$GITHUB_ENV"
          else
            echo "BUILD_PKG=false" >> "$GITHUB_ENV"
          fi
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-identity -v "$KEYCHAIN_PATH"

      - name: Store notarytool credentials
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_BASE64" > "$RUNNER_TEMP/notary-api-key.p8.b64"
          /usr/bin/base64 -D -i "$RUNNER_TEMP/notary-api-key.p8.b64" -o "$API_KEY_PATH"
          xcrun notarytool store-credentials "$NOTARYTOOL_PROFILE" \
            --key "$API_KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --validate

      - name: Build notarized zip
        run: ./packaging/build-notarized-zip.sh

      - name: Build notarized dmg
        run: ./packaging/build-notarized-dmg.sh

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          set -euo pipefail
          SPARKLE_KEY_PATH="$RUNNER_TEMP/sparkle-private-ed-key"
          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" > "$SPARKLE_KEY_PATH"
          chmod 600 "$SPARKLE_KEY_PATH"
          SPARKLE_PRIVATE_ED_KEY_FILE="$SPARKLE_KEY_PATH" ./packaging/generate-appcast.sh

      - name: Build notarized pkg
        if: env.BUILD_PKG == 'true'
        run: ./packaging/build-notarized-pkg.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "LidStay $RELEASE_TAG"
          fi
          artifacts=(
            dist/LidStay.dmg
            dist/LidStay.zip
            dist/updates/appcast.xml
            dist/updates/LidStay-*.zip
          )
          if [[ -f dist/LidStay.pkg ]]; then
            artifacts+=(dist/LidStay.pkg)
          fi
          gh release upload "$RELEASE_TAG" "${artifacts[@]}" --clobber
